name: SSLyze Multi-Domain Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install sslyze
    
    - name: Run multi-domain scan
      run: python testssl.py --domains domains.txt --json > domains-scan.json
      
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: domains-sslyze-results
        path: domains-scan.json
