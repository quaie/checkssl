name: 'TestSSL Domains Scanner'
description: 'Scans domains from file with testssl.sh, extracts metrics, saves JSON array'
inputs:
  domains-file:
    description: 'Path to domains file'
    required: true
    default: 'domains.txt'
  output-file:
    description: 'Output JSON file path'
    required: true
    default: 'testssl-results.json'
  scan-timeout:
    description: 'Timeout per domain (seconds)'
    required: false
    default: '60'
runs:
  using: 'composite'
  steps:
    - name: Install jq (JSON processor)
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y jq

    - name: Download testssl.sh
      shell: bash
      run: |
        curl -s https://testssl.sh/testssl.sh -o testssl.sh
        chmod +x testssl.sh

    - name: Scan domains and generate JSON
      shell: bash
      run: |
        cd ${{ github.action_path }}
        chmod +x scan-domains.sh
        ./scan-domains.sh
      env:
        DOMAINS_FILE: ${{ inputs.domains-file }}
        OUTPUT_FILE: ${{ inputs.output-file }}
        SCAN_TIMEOUT: ${{ inputs.scan-timeout }}
